# agentcontainer-enforcer sidecar deployment manifest.
#
# Usage:
#   docker compose up -d                          # Start enforcer only
#   docker compose --profile example up -d        # Start enforcer + example agent
#   docker compose down                           # Stop all services
#
# The agentcontainer-enforcer provides BPF-based security enforcement for agent containers
# via a gRPC API on port 50051 and a Unix domain socket.

services:
  agentcontainer-enforcer:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentcontainer-enforcer:latest
    container_name: agentcontainer-enforcer
    restart: unless-stopped

    cap_add:
      - BPF
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
    security_opt:
      - no-new-privileges:true

    ports:
      - "50051:50051"

    volumes:
      # Kernel cgroup filesystem (read-only) for cgroup ID resolution.
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      # BPF filesystem for pinning BPF maps and programs.
      - /sys/fs/bpf:/sys/fs/bpf
      # Shared socket directory for Unix domain socket communication.
      - agentcontainer-enforcer-socket:/run/agentcontainer-enforcer
      # Enforcer configuration (read-only).
      - agentcontainer-enforcer-config:/etc/agentcontainer-enforcer:ro

    environment:
      RUST_LOG: info

    command:
      - "--listen"
      - "0.0.0.0:50051"
      - "--socket"
      - "/run/agentcontainer-enforcer/agentcontainer-enforcer.sock"

    networks:
      - ac-enforcement

    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=localhost:50051", "-service=agentcontainers.enforcer.v1.Enforcer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      org.opencontainers.image.title: "agentcontainer-enforcer"
      org.opencontainers.image.description: "BPF enforcement sidecar for agentcontainers"
      org.opencontainers.image.source: "https://github.com/Kubedoll-Heavy-Industries/agentcontainers"
      org.opencontainers.image.vendor: "Kubedoll Heavy Industries"

  agent:
    image: ${AGENT_IMAGE:-ubuntu:22.04}
    container_name: ac-agent
    profiles:
      - example

    depends_on:
      agentcontainer-enforcer:
        condition: service_healthy

    environment:
      AC_ENFORCER_ADDR: "agentcontainer-enforcer:50051"

    volumes:
      # Workspace mount — override WORKSPACE_DIR to bind your project.
      - ${WORKSPACE_DIR:-.}:/workspace
      # Shared socket directory for Unix domain socket fallback.
      - agentcontainer-enforcer-socket:/run/agentcontainer-enforcer:ro

    working_dir: /workspace

    networks:
      - ac-enforcement

    # Keep the container running for interactive use.
    stdin_open: true
    tty: true

volumes:
  agentcontainer-enforcer-socket:
    driver: local
  agentcontainer-enforcer-config:
    driver: local

networks:
  ac-enforcement:
    driver: bridge
