# Local Vault/OpenBao development server for testing.
# NOT for production — dev mode stores data in memory and runs unsealed.
#
# Usage:
#   docker compose up -d
#   export VAULT_ADDR=http://127.0.0.1:8200
#   export VAULT_TOKEN=dev-root-token
#   ./setup.sh

services:
  vault:
    # Replace with "openbao/openbao:latest" for OpenBao.
    image: hashicorp/vault:1.17
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 5
